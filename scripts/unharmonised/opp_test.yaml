# Sketch of yaml file to define an Opportunity in the unharmonised DR 
#
# - Minimal definition of Opportunity (one yaml file = one Opportunity)
# - Variable Groups can be existing (just give name) or new (define it here)
# - Ditto for Experiment Groups
#
# Use of existing experiments (in CVs) and variables (in CMIP7 DR)
# Defining new experiments done in CVs
# Defining new variables needs new process (variable register governance?)
#
# Ingestion script processes the yaml file:
# - validate experiment names against CVs (use esgvoc)
# - validate variables against DR
# - supplement with derived info (e.g. no. of variables, Opportunity volume, ...)
# - saves the Opportunity in equivalent json format to Harmonised DR Opportunities
# Same format ==> can be treated like any Harmonised Opportunities using existing DR python tools


